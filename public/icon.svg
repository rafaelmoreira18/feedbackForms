<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#1e40af"/>
  <!-- Clipboard body -->
  <rect x="7" y="9" width="18" height="20" rx="2" fill="white"/>
  <!-- Clipboard clip top -->
  <rect x="12" y="6" width="8" height="5" rx="2" fill="#93c5fd"/>
  <rect x="14" y="5" width="4" height="4" rx="2" fill="white" stroke="#1e40af" stroke-width="1.2"/>
  <!-- Check lines -->
  <line x1="11" y1="15" x2="21" y2="15" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="19" x2="21" y2="19" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="23" x2="17" y2="23" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Checkmark -->
  <polyline points="18,21.5 19.5,23 22,20" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
